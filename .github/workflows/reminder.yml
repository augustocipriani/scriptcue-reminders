name: ScriptCue Reminder

on:
  schedule:
    - cron: '*/10 * * * *'   # GitHub throttles this on low-traffic repos; logic below tolerates late/irregular runs
  workflow_dispatch:
    inputs:
      test_message:
        description: 'Send this text immediately as a test (leave blank for a normal schedule run)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run reminders
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TEST_MESSAGE: ${{ github.event.inputs.test_message }}
        run: |
          send() {
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${CHAT_ID}" \
              --data-urlencode "text=$1" \
              -d "disable_web_page_preview=true" >/dev/null
          }
          if [ -n "$TEST_MESSAGE" ]; then send "$TEST_MESSAGE"; echo "test sent"; exit 0; fi
          now=$(date -u +%s)
          changed=0
          count=$(jq 'length' schedule.json)
          if [ "$count" -gt 0 ]; then
            for i in $(seq 0 $((count-1))); do
              sent=$(jq -r ".[$i].sent // false" schedule.json)
              at=$(jq -r ".[$i].at" schedule.json)
              at_epoch=$(date -u -d "$at" +%s)
              # Send once on the first run at or after the scheduled time (tolerates GitHub's irregular cron).
              if [ "$sent" != "true" ] && [ "$now" -ge "$at_epoch" ]; then
                text=$(jq -r ".[$i].text" schedule.json)
                send "$text"
                jq ".[$i].sent = true" schedule.json > tmp.json && mv tmp.json schedule.json
                changed=1
                echo "Sent reminder scheduled for $at"
              fi
            done
          fi
          if [ "$changed" = "1" ]; then
            git config user.name "reminder-bot"
            git config user.email "actions@users.noreply.github.com"
            git add schedule.json
            git commit -m "mark reminder(s) sent"
            git push
          fi
